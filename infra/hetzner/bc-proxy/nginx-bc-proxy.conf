# Optional public nginx example for the bc-proxy host.
# The production tailnet path does not require nginx.

limit_req_zone $binary_remote_addr zone=bc_proxy_zone:10m rate=10r/s;

server {
    listen 80;
    server_name bc-proxy.example.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name bc-proxy.example.com;

    server_tokens off;
    client_max_body_size 1M;
    proxy_read_timeout 60s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 10s;

    location = /healthz { proxy_pass http://127.0.0.1:8500/healthz; }
    location = /healthz/upstream { proxy_pass http://127.0.0.1:8500/healthz/upstream; }

    location / {
        limit_req zone=bc_proxy_zone burst=20 nodelay;
        proxy_pass http://127.0.0.1:8500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}
